# easy-ai 全栈 compose(单文件部署)
#
# 包含四部分:
#   1. easy-ai 自研: easy-ai-backend / easy-ai-frontend / flowise
#   2. Langfuse 应用: langfuse-web / langfuse-worker
#   3. RAGFlow 应用: ragflow / ragflow-mysql / ragflow-es
#   4. 基础设施: postgres / redis / clickhouse / minio
#
# 宿主机端口统一在 188xx 段;easy-ai-frontend / langfuse-web / ragflow Web UI
# 绑定到 0.0.0.0 对外开放,其余组件全部绑定 127.0.0.1 仅本机可访问。
#
# RAGFlow 复用现网 minio (按 prefix 隔离) 与 redis (用 db=1),
# 但其结构化数据库使用专用 ragflow-mysql、向量/全文检索使用专用 ragflow-es,
# 避免与 easy-ai 自身的 postgres / clickhouse 互相干扰。
#
# 用法见 deploy.sh。

services:
  # ============================================================
  # easy-ai 自研
  # ============================================================
  easy-ai-backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: easy-ai-backend
    restart: unless-stopped
    environment:
      APP_NAME: easy-ai-backend
      APP_ENV: prod
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/easyai
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: HS256
      SNOWFLAKE_WORKER_ID: ${SNOWFLAKE_WORKER_ID:-1}
      LANGFUSE_ENABLED: ${LANGFUSE_ENABLED:-false}
      LANGFUSE_HOST: http://langfuse-web:3000
      # 直接复用 langfuse 首次 init 的 project keys,单一事实源
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY:-}
      FLOWISE_ENABLED: "true"
      FLOWISE_INTERNAL_URL: http://flowise:3001
      FLOWISE_SHARED_SECRET: ${FLOWISE_SHARED_SECRET}
      FLOWISE_DEFAULT_WORKSPACE: ""
      RAGFLOW_ENABLED: ${RAGFLOW_ENABLED:-true}
      RAGFLOW_BASE_URL: http://ragflow:9380
      RAGFLOW_SHARED_SECRET: ${RAGFLOW_SHARED_SECRET}
      RAGFLOW_TIMEOUT_SEC: ${RAGFLOW_TIMEOUT_SEC:-30}
    volumes:
      - easy-ai-data:/srv/easy-ai-backend/data
    depends_on:
      flowise:
        condition: service_started
      postgres:
        condition: service_healthy
      ragflow:
        condition: service_started

  easy-ai-frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: easy-ai-frontend
    restart: unless-stopped
    ports:
      - "${EASYAI_HTTP_PORT:-18080}:80"
    depends_on:
      - easy-ai-backend

  flowise:
    build:
      context: ../Flowise
      dockerfile: Dockerfile
    container_name: easy-ai-flowise
    restart: unless-stopped
    # 覆盖镜像里的 USER node:容器隔离环境下用 root 简单可靠,
    # 避免 /home/node/.flowise volume 挂载点权限问题
    user: root
    environment:
      PORT: 3001
      EASYAI_TRUSTED_HEADER: "true"
      EASYAI_SHARED_SECRET: ${FLOWISE_SHARED_SECRET}
      IFRAME_ORIGINS: "*"
      DATABASE_PATH: /root/.flowise
      SECRETKEY_PATH: /root/.flowise
      LOG_PATH: /root/.flowise/logs
      BLOB_STORAGE_PATH: /root/.flowise/storage
      DISABLE_FLOWISE_TELEMETRY: "true"
    volumes:
      - flowise-data:/root/.flowise

  # ============================================================
  # Langfuse 应用
  # ============================================================
  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: easy-ai-langfuse-worker
    restart: unless-stopped
    depends_on: &langfuse-depends-on
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    ports:
      - "127.0.0.1:18033:3030"
    environment: &langfuse-worker-env
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/langfuse
      SALT: ${SALT}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      TELEMETRY_ENABLED: ${TELEMETRY_ENABLED:-false}
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: ${LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES:-true}
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_USE_AZURE_BLOB: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: ${LANGFUSE_S3_EVENT_UPLOAD_BUCKET:-langfuse}
      LANGFUSE_S3_EVENT_UPLOAD_REGION: ${LANGFUSE_S3_EVENT_UPLOAD_REGION:-auto}
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: ${LANGFUSE_S3_EVENT_UPLOAD_BUCKET:-langfuse}
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: ${LANGFUSE_S3_EVENT_UPLOAD_REGION:-auto}
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      # 浏览器用的 presigned URL,指向宿主机上的 minio API 端口
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://localhost:18090
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
      LANGFUSE_S3_BATCH_EXPORT_ENABLED: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_AUTH: ${REDIS_AUTH}
      REDIS_TLS_ENABLED: "false"

  langfuse-web:
    image: langfuse/langfuse:3
    container_name: easy-ai-langfuse-web
    restart: unless-stopped
    depends_on: *langfuse-depends-on
    ports:
      - "${LANGFUSE_WEB_PORT:-18030}:3000"
    environment:
      <<: *langfuse-worker-env
      NEXTAUTH_URL: http://localhost:${LANGFUSE_WEB_PORT:-18030}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      LANGFUSE_INIT_ORG_ID: ${LANGFUSE_INIT_ORG_ID:-}
      LANGFUSE_INIT_ORG_NAME: ${LANGFUSE_INIT_ORG_NAME:-}
      LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID:-}
      LANGFUSE_INIT_PROJECT_NAME: ${LANGFUSE_INIT_PROJECT_NAME:-}
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY:-}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY:-}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:-}
      LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME:-}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-}

  # ============================================================
  # RAGFlow 应用(知识库底层引擎)
  # ============================================================
  # 部署形态:
  # - 主服务 ragflow 暴露 :9380 (HTTP API) 与 :80 (Web UI)
  # - 结构化数据用专用 ragflow-mysql,与 easy-ai-postgres 解耦
  # - 全文/向量索引用专用 ragflow-es (Elasticsearch 8)
  # - 对象存储复用现网 minio (按 user/前缀隔离)
  # - 缓存复用现网 redis (使用 db=1)
  # Embedding 模型由 easy-ai 的 LLM 管理外部 provider 提供, 不部署 TEI
  ragflow:
    # 自有 fork: ragflow/ submodule (分支 v0.25.2), 内置 easyai trusted-header
    # 中间件 + bootstrap, 详见 docs/knowledge-rag-integration-design.md §3.2。
    # 首次 `./deploy.sh up` 会自动 build, 与 backend / Flowise 同模式。
    build:
      context: ../ragflow
      dockerfile: Dockerfile
      args:
        # 国内构建可在 .env 把 RAGFLOW_NEED_MIRROR=1 切到阿里云 pypi 镜像
        NEED_MIRROR: ${RAGFLOW_NEED_MIRROR:-0}
        # submodule 形态下 .git 是文件不是目录, git describe 不可用; 由这里兜底
        RAGFLOW_VERSION: ${RAGFLOW_VERSION:-v0.25.2-easyai}
    container_name: easy-ai-ragflow
    restart: unless-stopped
    ports:
      # 主 HTTP API,easy-ai-backend 调用入口;仅本机调试用
      - "127.0.0.1:18040:9380"
      # 内置 Web UI;绑定 0.0.0.0 对外开放(与 easy-ai-frontend / langfuse-web 同策略)
      - "${RAGFLOW_WEB_PORT:-18044}:80"
    environment:
      # ── MySQL ──
      MYSQL_HOST: ragflow-mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: ${RAGFLOW_MYSQL_PASSWORD}
      MYSQL_DBNAME: rag_flow
      # ── Doc Engine: Elasticsearch ──
      DOC_ENGINE: elasticsearch
      ES_HOST: ragflow-es
      ES_PORT: 9200
      ES_USER: elastic
      ELASTIC_PASSWORD: ${RAGFLOW_ES_PASSWORD}
      # ── MinIO(复用 easy-ai-minio,按 user/前缀隔离)──
      MINIO_HOST: minio
      MINIO_USER: ${MINIO_ROOT_USER}
      MINIO_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_PREFIX_PATH: ragflow
      # ── Redis(复用 easy-ai-redis,RAGFlow 内部使用 db=1)──
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_AUTH}
      # ── EasyAI trusted-header 鉴权(fork 注入,详见 §3) ──
      EASYAI_TRUSTED_HEADER: "true"
      EASYAI_SHARED_SECRET: ${RAGFLOW_SHARED_SECRET}
      EASYAI_BOOTSTRAP_EMAIL: ${EASYAI_BOOTSTRAP_EMAIL:-easyai@system.local}
      EASYAI_BOOTSTRAP_NICKNAME: ${EASYAI_BOOTSTRAP_NICKNAME:-easyai-system}
      EASYAI_BOOTSTRAP_PASSWORD: ${EASYAI_BOOTSTRAP_PASSWORD:-}
      # ── 其他 ──
      TZ: Asia/Shanghai
      STACK_VERSION: 8.11.3
    volumes:
      - ragflow-logs:/ragflow/logs
    depends_on:
      ragflow-mysql:
        condition: service_healthy
      ragflow-es:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ragflow-mysql:
    image: mysql:8.0.39
    container_name: easy-ai-ragflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${RAGFLOW_MYSQL_PASSWORD}
    command:
      --max_connections=1000
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --tls_version=TLSv1.2,TLSv1.3
      --init-file=/data/application/init.sql
      --binlog_expire_logs_seconds=604800
    ports:
      - "127.0.0.1:18045:3306"
    volumes:
      - ragflow-mysql-data:/var/lib/mysql
      - ./ragflow-init/init.sql:/data/application/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-p${RAGFLOW_MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 10s
      retries: 30

  ragflow-es:
    image: elasticsearch:8.11.3
    container_name: easy-ai-ragflow-es
    restart: unless-stopped
    environment:
      node.name: es01
      ELASTIC_PASSWORD: ${RAGFLOW_ES_PASSWORD}
      bootstrap.memory_lock: "false"
      discovery.type: single-node
      xpack.security.enabled: "true"
      xpack.security.http.ssl.enabled: "false"
      xpack.security.transport.ssl.enabled: "false"
      cluster.routing.allocation.disk.watermark.low: 5gb
      cluster.routing.allocation.disk.watermark.high: 3gb
      cluster.routing.allocation.disk.watermark.flood_stage: 2gb
    mem_limit: ${RAGFLOW_ES_MEM_LIMIT:-4g}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "127.0.0.1:18041:9200"
    volumes:
      - ragflow-es-data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        - "CMD-SHELL"
        - "curl -fsS -u elastic:${RAGFLOW_ES_PASSWORD} http://localhost:9200/_cluster/health || exit 1"
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 30s

  # ============================================================
  # 基础设施(仅 127.0.0.1,内网通信)
  # ============================================================
  postgres:
    image: postgres:${POSTGRES_VERSION:-15}
    container_name: easy-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # bootstrap 默认库,实际应用用的 langfuse / easyai 由 init 脚本显式创建
      POSTGRES_DB: postgres
    ports:
      - "127.0.0.1:18032:5432"
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
      # 仅在 pg 数据目录为空时执行一次,建 langfuse 和 easyai 两个应用库
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 3s
      timeout: 3s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server
    container_name: easy-ai-clickhouse
    restart: unless-stopped
    user: "101:101"
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-default}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    ports:
      - "127.0.0.1:18123:8123"
      - "127.0.0.1:18190:9000"
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
      - langfuse_clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 1s

  minio:
    image: minio/minio
    container_name: easy-ai-minio
    restart: unless-stopped
    entrypoint: sh
    command: -c 'mkdir -p /data/${LANGFUSE_S3_EVENT_UPLOAD_BUCKET:-langfuse} && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:18090:9000"
      - "127.0.0.1:18091:9001"
    volumes:
      - langfuse_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 1s
      timeout: 5s
      retries: 5
      start_period: 1s

  redis:
    image: redis:7
    container_name: easy-ai-redis
    restart: unless-stopped
    command: >
      --requirepass ${REDIS_AUTH}
    ports:
      - "127.0.0.1:18079:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10

volumes:
  easy-ai-data:
  flowise-data:
  langfuse_postgres_data:
  langfuse_clickhouse_data:
  langfuse_clickhouse_logs:
  langfuse_minio_data:
  ragflow-logs:
  ragflow-mysql-data:
  ragflow-es-data:
